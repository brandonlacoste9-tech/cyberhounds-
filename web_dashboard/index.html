<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐺 Cyberhound B2B</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0f;
            color: #00ff88;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 60px;
        }
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid #00ff88;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 3em;
            text-shadow: 0 0 20px #00ff88;
        }
        .tagline {
            color: #888;
            margin-top: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #111;
            border: 1px solid #00ff88;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
        }
        .stat-label {
            color: #888;
            text-transform: uppercase;
            font-size: 0.8em;
            margin-top: 5px;
        }
        .leads-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.9em;
        }
        .leads-table th,
        .leads-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #222;
        }
        .leads-table th {
            background: #111;
            color: #00ff88;
            text-transform: uppercase;
            font-size: 0.8em;
        }
        .leads-table tr:hover {
            background: #111;
        }
        .severity-CRITICAL { color: #ff4444; font-weight: bold; }
        .severity-HIGH { color: #ff8844; }
        .severity-MEDIUM { color: #ffaa44; }
        .severity-LOW { color: #88ff88; }
        .btn {
            background: transparent;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 6px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8em;
        }
        .btn:hover {
            background: #00ff88;
            color: #000;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            text-transform: uppercase;
        }
        .status-PENDING { background: #ff880033; color: #ff8844; border: 1px solid #ff8844; }
        .status-APPROVED { background: #00ff8833; color: #00ff88; border: 1px solid #00ff88; }
        .status-VETOED { background: #ff444433; color: #ff4444; border: 1px solid #ff4444; }
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            border-top: 1px solid #00ff88;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 2s infinite;
            margin-right: 8px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state h3 {
            color: #888;
            margin-bottom: 10px;
        }
        .refresh-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #00ff88;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error {
            background: #ff444422;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
    
    <div class="container">
        <header>
            <h1>🐺 CYBERHOUND</h1>
            <p class="tagline">B2B Compliance Gap Hunting | $5K-25K Deals</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="pending-count">-</div>
                <div class="stat-label">Pending Strikes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="settled-count">-</div>
                <div class="stat-label">Settled Deals</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pipeline-value">-</div>
                <div class="stat-label">Pipeline</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="targets-hunted">-</div>
                <div class="stat-label">Targets Hunted</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="cycle-num">-</div>
                <div class="stat-label">Hunt Cycle</div>
            </div>
        </div>

        <h2 style="margin-bottom: 20px;">📋 LE_BUTIN (Live Strikes)</h2>
        <div id="leads-container">
            <div class="loading">Loading real data from LE_BUTIN.json...</div>
        </div>
    </div>

    <div class="status-bar">
        <span><span class="status-indicator"></span> Sovereign Loop: <span id="loop-status">CONNECTING</span></span>
        <span>Last Update: <span id="last-update">--</span></span>
    </div>

    <script>
        const BUTIN_URL = '../hound_core/data/LE_BUTIN.json';
        const PENDING_URL = '../hound_core/data/pending_strikes.json';

        function formatCurrency(value) {
            if (!value || value === '-') return '$0';
            return '$' + value.toLocaleString();
        }

        function formatDate(isoString) {
            if (!isoString) return '--';
            const date = new Date(isoString);
            return date.toLocaleString();
        }

        function getSeverityClass(severity) {
            return `severity-${severity || 'MEDIUM'}`;
        }

        function getStatusBadge(status) {
            const classes = {
                'PENDING_APPROVAL': 'status-PENDING',
                'APPROVED': 'status-APPROVED',
                'VETOED': 'status-VETOED'
            };
            const labels = {
                'PENDING_APPROVAL': 'Pending',
                'APPROVED': 'Approved',
                'VETOED': 'Vetoed'
            };
            const cls = classes[status] || 'status-PENDING';
            const label = labels[status] || status;
            return `<span class="status-badge ${cls}">${label}</span>`;
        }

        async function loadData() {
            document.getElementById('loop-status').textContent = 'LOADING';
            document.getElementById('leads-container').innerHTML = '<div class="loading">Fetching real data...</div>';

            try {
                // Try to fetch LE_BUTIN
                let butinData = null;
                let pendingData = [];

                try {
                    const butinRes = await fetch(BUTIN_URL + '?t=' + Date.now());
                    if (butinRes.ok) {
                        butinData = await butinRes.json();
                    }
                } catch (e) {
                    console.log('LE_BUTIN not found yet');
                }

                try {
                    const pendingRes = await fetch(PENDING_URL + '?t=' + Date.now());
                    if (pendingRes.ok) {
                        pendingData = await pendingRes.json();
                    }
                } catch (e) {
                    console.log('Pending strikes not found yet');
                }

                // Update stats
                if (butinData) {
                    document.getElementById('pending-count').textContent = butinData.pending_count || 0;
                    document.getElementById('settled-count').textContent = butinData.settled_count || 0;
                    document.getElementById('pipeline-value').textContent = formatCurrency(butinData.pipeline_value);
                    document.getElementById('targets-hunted').textContent = butinData.targets_hunted || 0;
                    document.getElementById('cycle-num').textContent = butinData.cycle || 0;
                    document.getElementById('last-update').textContent = formatDate(butinData.timestamp);
                } else {
                    document.getElementById('pending-count').textContent = pendingData.length || 0;
                    document.getElementById('pipeline-value').textContent = formatCurrency(
                        pendingData.reduce((sum, p) => sum + (p.proposed_price || 0), 0)
                    );
                }

                // Render leads
                const leads = butinData?.latest_strikes || pendingData || [];
                renderLeads(leads);

                document.getElementById('loop-status').textContent = 'ONLINE';
                document.getElementById('loop-status').style.color = '#00ff88';

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('leads-container').innerHTML = `
                    <div class="error">
                        <strong>Error loading data:</strong> ${error.message}<br><br>
                        Make sure sovereign_loop.py has run at least once to create LE_BUTIN.json
                    </div>
                `;
                document.getElementById('loop-status').textContent = 'ERROR';
                document.getElementById('loop-status').style.color = '#ff4444';
            }
        }

        function renderLeads(leads) {
            const container = document.getElementById('leads-container');

            if (!leads || leads.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>📭 No strikes yet</h3>
                        <p>Add targets to hound_core/data/targets.txt and run sovereign_loop.py</p>
                    </div>
                `;
                return;
            }

            const table = document.createElement('table');
            table.className = 'leads-table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Pack ID</th>
                        <th>Company</th>
                        <th>Gap Type</th>
                        <th>Risk</th>
                        <th>Price</th>
                        <th>ROI</th>
                        <th>Conf</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    ${leads.map(lead => `
                        <tr>
                            <td><code>${lead.pack_id?.slice(0, 20) || 'N/A'}...</code></td>
                            <td><strong>${lead.company || 'Unknown'}</strong></td>
                            <td class="${getSeverityClass(lead.severity)}">${(lead.gap_type || 'unknown').toUpperCase()}</td>
                            <td>${formatCurrency(lead.fine_risk)}</td>
                            <td>${formatCurrency(lead.proposed_price)}</td>
                            <td>${lead.roi_for_client || lead.roi || 'N/A'}</td>
                            <td>${Math.round((lead.confidence || 0) * 100)}%</td>
                            <td>${getStatusBadge(lead.status)}</td>
                        </tr>
                    `).join('')}
                </tbody>
            `;

            container.innerHTML = '';
            container.appendChild(table);
        }

        // Initial load
        loadData();

        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
